# Woodpecker CI pipeline for the Insty Compiler.
# Uses the locally-built insty-ci:llvm22 image (clang/lld/llvm 22.1.7 + deps).
# `pull` defaults to false, so the local image is used without a registry pull.

steps:
  - name: configure
    image: insty-ci:llvm22
    commands:
      - cmake -S . -B build -G Ninja
        -DINSTY_LLVM_ROOT=/usr/lib/llvm-22
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_CXX_COMPILER=clang++
        -DINSTY_BUILD_TESTS=ON

  - name: build
    image: insty-ci:llvm22
    commands:
      - ninja -C build
      - test -x build/insty

  - name: test
    image: insty-ci:llvm22
    commands:
      - ctest --test-dir build --output-on-failure

  - name: release
    image: insty-ci:llvm22
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: github_token
    commands:
      - gh release create "$CI_COMMIT_TAG" --repo "$CI_REPO" --title "$CI_COMMIT_TAG" --generate-notes || true
      - gh release upload "$CI_COMMIT_TAG" --repo "$CI_REPO" --clobber build/insty

  # Windows cross-compile (llvm-mingw + prebuilt static LLVM baked into image).
  - name: build-windows
    image: insty-ci-win:llvm22
    commands:
      - cmake -S . -B build-win -G Ninja
        -DCMAKE_TOOLCHAIN_FILE=/opt/win-toolchain.cmake
        -DINSTY_LLVM_ROOT=/opt/insty-llvm-win
        -DINSTY_BUILD_TESTS=OFF
        -DCMAKE_BUILD_TYPE=Release
      - ninja -C build-win
      - test -f build-win/insty.exe

  - name: release-windows
    image: insty-ci-win:llvm22
    when:
      - event: tag
    environment:
      GH_TOKEN:
        from_secret: github_token
    commands:
      - cp build-win/insty.exe build-win/insty-windows-x86_64.exe
      - gh release upload "$CI_COMMIT_TAG" --repo "$CI_REPO" --clobber build-win/insty-windows-x86_64.exe
